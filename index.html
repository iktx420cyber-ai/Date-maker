<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Question</title>
<style>
body {
  margin: 0;
  padding: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  background: linear-gradient(135deg, #ff758c, #ff7eb3);
  font-family: sans-serif;
  text-align: center;
  overflow: hidden;
}
h1 { color: #4a0033; font-size: 32px; }
button {
  padding: 12px 25px;
  font-size: 18px;
  margin: 10px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  transition: 0.3s;
  position: absolute;
}
#yesBtn { background-color: #28a745; color: white; }
#noBtn { background-color: #dc3545; color: white; }

button:hover { transform: scale(1.1); }

.modal {
  display: none;
  position: fixed;
  z-index: 999;
  left: 0; top: 0;
  width: 100%; height: 100%;
  background: rgba(0,0,0,0.6);
  justify-content: center;
  align-items: center;
}
.modal-content {
  background: white;
  padding: 25px;
  border-radius: 15px;
  text-align: center;
  width: 280px;
  animation: pop 0.3s ease;
}
.modal-content img { width: 200px; border-radius: 10px; margin-top: 10px; }
@keyframes pop { from { transform: scale(0.7); opacity:0; } to { transform: scale(1); opacity:1; } }
</style>
</head>
<body>

<h1 id="mainText">Will you be mine? ❤️</h1>
<button id="yesBtn">Yes</button>
<button id="noBtn">No</button>

<div id="noModal" class="modal">
  <div class="modal-content">
    <h2>راه فراری نیست 😈</h2>
    <img src="Spongi.jpg" alt="no escape"><br><br>
    <button onclick="closeModal()">Okay 😅</button>
  </div>
</div>

<audio id="bgMusic" loop>
  <source src="radiohead_-_jigsaw_falling_into_place.mp3" type="audio/mp3">
</audio>

<script>
const yesBtn = document.getElementById("yesBtn");
const noBtn = document.getElementById("noBtn");
const noModal = document.getElementById("noModal");
const bgMusic = document.getElementById("bgMusic");
let noCount = 0;

// autoplay fix
window.addEventListener("click", () => bgMusic.play().catch(()=>{}), {once:true});
window.addEventListener("touchstart", () => bgMusic.play().catch(()=>{}), {once:true});

// No button حرکت تصادفی
function moveNo() {
  const padding = 20;
  const maxX = window.innerWidth - noBtn.offsetWidth - padding;
  const maxY = window.innerHeight - noBtn.offsetHeight - padding;
  let newX, newY;
  do {
    newX = Math.random() * maxX;
    newY = Math.random() * maxY;
  } while (
    Math.abs(newX - yesBtn.offsetLeft) < 100 &&
    Math.abs(newY - yesBtn.offsetTop) < 50
  );
  noBtn.style.left = `${newX}px`;
  noBtn.style.top = `${newY}px`;
}

function clickNo() {
  noCount++;
  if(noCount >= 3){
    noModal.style.display = "flex";
    noCount = 0;
  } else moveNo();
}

function closeModal() { noModal.style.display = "none"; }

function clickYes() {
  document.body.innerHTML = "<h1 style='color:#1b5e20; margin-top:40vh;'>Good choice 😌</h1>";
  setTimeout(()=>{ window.location.href = "sms:+989136939807"; }, 400);
}

// event listeners
noBtn.addEventListener("mouseenter", clickNo);
noBtn.addEventListener("touchstart", e=>{ e.preventDefault(); clickNo(); }, {passive:false});
yesBtn.addEventListener("click", clickYes);

// شروع موقعیت اولیه دکمه‌ها
window.addEventListener("load", () => {
  yesBtn.style.left = "40%";
  yesBtn.style.top = "60%";
  noBtn.style.left = "60%";
  noBtn.style.top = "60%";
});
</script>
</body>
</html>
